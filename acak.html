<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roda Berputar Realistis 🎉</title>
    <!-- CSS diletakkan di bawah ini -->
    
</head><style>
    body { 
        font-family: 'Comic Sans MS', 'Chalkboard SE', Arial, sans-serif; 
        text-align: center; 
        margin: 0;
        padding: 30px 10px;
        background: linear-gradient(135deg, #FFE5EC 0%, #CCFBFF 100%); 
        min-height: 100vh;
        box-sizing: border-box;
    }

    h2 {
        color: #FF2E93;
        font-size: 34px;
        text-shadow: 3px 3px 0px #FFF, 5px 5px 0px #FF85A2;
        margin-bottom: 5px;
    }

    p { color: #4A4A4A; font-weight: bold; }

    .main-wrapper {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 40px;
        max-width: 900px;
        margin: 20px auto;
    }

    .input-card {
        background: white;
        padding: 25px;
        border-radius: 20px;
        border: 4px solid #57CC99;
        box-shadow: 0 8px 0px #98E2C6;
        width: 300px;
    }

    textarea { 
        width: 90%; 
        height: 180px; 
        padding: 12px; 
        font-size: 16px; 
        border: 3px solid #FFAAA6;
        border-radius: 12px;
        outline: none;
        resize: none;
        font-family: inherit;
    }

    button { 
        padding: 12px 30px; 
        font-size: 18px; 
        font-weight: bold;
        font-family: inherit;
        background: #FF7096; 
        color: white; 
        border: none; 
        border-radius: 50px;
        cursor: pointer; 
        margin-top: 15px; 
        box-shadow: 0 5px 0px #C93B61;
        transition: all 0.1s ease;
    }
    button:hover { background: #FF5C8A; }
    button:active {
        box-shadow: 0 2px 0px #C93B61;
        transform: translateY(3px);
    }
    button:disabled { background: #95a5a6; box-shadow: 0 5px 0px #7f8c8d; cursor: not-allowed; }

    .wheel-container {
        position: relative;
        width: 400px;
        height: 400px;
    }

    canvas {
        border-radius: 50%;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        border: 8px solid #FFD166;
        background: #fff;
    }

    /* Modifikasi Jarum: Mengubah transform-origin ke bagian atas agar pangkalnya yang bergoyang */
    .pointer {
        position: absolute;
        top: -15px;
        left: 50%;
        transform: translateX(-50%) rotate(0deg);
        transform-origin: top center;
        width: 0;
        height: 0;
        border-left: 20px solid transparent;
        border-right: 20px solid transparent;
        border-top: 35px solid #FF3366;
        z-index: 10;
        filter: drop-shadow(0px 3px 2px rgba(0,0,0,0.3));
    }

    /* Efek animasi jarum terhentak/tergoyang saat dilewati garis */
    .pointer.tick {
        animation: pinBounce 0.1s ease-out;
    }

    @keyframes pinBounce {
        0% { transform: translateX(-50%) rotate(0deg); }
        30% { transform: translateX(-50%) rotate(-18deg); } /* Goyang ke kiri/terseret roda */
        100% { transform: translateX(-50%) rotate(0deg); }  /* Kembali membal ke tengah */
    }

    .center-pin {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 30px;
        height: 30px;
        background: #FFD166;
        border: 4px solid #fff;
        border-radius: 50%;
        z-index: 5;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    #result-box {
        margin: 30px auto 0 auto;
        padding: 15px;
        border-radius: 20px;
        background: #1a1a2e; 
        border: 5px dashed #FFD166;
        max-width: 500px;
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    #result { 
        font-size: 32px; 
        font-weight: bold; 
        color: #FFF;
        text-shadow: 0 0 10px rgba(255,255,255,0.6);
    }
</style>

<body>

    <h2>🎪 Roda Berputar Misterius 🎉</h2>
    <p>Masukkan nama-nama, lalu putar rodanya!</p>
    
    <div class="main-wrapper">
        <!-- Sisi Kiri: Tempat input daftar nama -->
        <div class="input-card">
            <textarea id="nameList" placeholder="Kimi&#10;Zuzu&#10;Boni&#10;Tatan&#10;Lala" oninput="drawWheel()"></textarea>
            <br>
            <button id="spinBtn" onclick="spinWheel()">PUTAR RODA! 🎡</button>
        </div>
        
        <!-- Sisi Kanan: Area Roda Berputar -->
        <div class="wheel-container">
            <!-- Jarum ditambahkan id "wheelPointer" untuk animasi CSS -->
            <div id="wheelPointer" class="pointer"></div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
            <div class="center-pin"></div>
        </div>
    </div>

    <div id="result-box">
        <div id="result">Siapa yang beruntung? 🕵️‍♂️</div>
    </div>

    <!-- JavaScript diletakkan di bawah ini -->
    <script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const colors = ['#FF477E', '#FFD166', '#06D6A0', '#118AB2', '#8338EC', '#FF006E', '#3A86FF', '#00F5D4', '#FF9F1C', '#4EA8DE'];
    
    let currentAngle = 0;
    let isSpinning = false;
    let names = [];
    let lastSegmentIndex = -1; // Melacak index segmen terakhir yang menyentuh jarum

    function drawWheel() {
        const rawText = document.getElementById('nameList').value;
        names = rawText.split('\n').map(name => name.trim()).filter(name => name.length > 0);
        
        const numSegments = names.length;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (numSegments === 0) {
            ctx.fillStyle = "#ccc";
            ctx.beginPath();
            ctx.arc(200, 200, 200, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = "#666";
            ctx.font = "20px Arial";
            ctx.textAlign = "center";
            ctx.fillText("Masukkan nama dahulu", 200, 200);
            return;
        }

        const arcSize = (2 * Math.PI) / numSegments;

        for (let i = 0; i < numSegments; i++) {
            const angle = currentAngle + (i * arcSize);
            
            ctx.fillStyle = colors[i % colors.length];
            ctx.beginPath();
            ctx.moveTo(200, 200);
            ctx.arc(200, 200, 200, angle, angle + arcSize);
            ctx.lineTo(200, 200);
            ctx.fill();
            ctx.stroke();

            ctx.save();
            ctx.translate(200, 200);
            ctx.rotate(angle + (arcSize / 2));
            ctx.textAlign = "right";
            ctx.fillStyle = "#FFF";
            ctx.font = "bold 16px Arial";
            let displayName = names[i];
            if (displayName.length > 12) displayName = displayName.substring(0, 10) + "..";
            ctx.fillText(displayName, 180, 5);
            ctx.restore();
        }
    }

    function spinWheel() {
        if (isSpinning || names.length === 0) return;

        isSpinning = true;
        document.getElementById('spinBtn').disabled = true;
        document.getElementById('result').innerText = "Roda sedang berputar... 🎡";

        let spinVelocity = Math.random() * 0.4 + 0.8; 
        const friction = 0.993; 
        const pointerEl = document.getElementById('wheelPointer');

        function animate() {
            currentAngle += spinVelocity; 
            spinVelocity *= friction;     

            drawWheel(); 

            // --- LOGIKA JARUM GOYANG MEKANIS ---
            const numSegments = names.length;
            const arcSize = (2 * Math.PI) / numSegments;
            // Hitung segmen mana yang saat ini sedang berada tepat di bawah jarum atas
            let pointerAngle = (1.5 * Math.PI - currentAngle) % (2 * Math.PI);
            if (pointerAngle < 0) pointerAngle += 2 * Math.PI;
            const currentSegmentIndex = Math.floor(pointerAngle / arcSize);

            // Jika indeks segmen berubah, berarti garis pembatas baru saja melewati jarum
            if (currentSegmentIndex !== lastSegmentIndex) {
                lastSegmentIndex = currentSegmentIndex;
                
                // Memicu ulang animasi CSS guncangan jarum (.tick)
                pointerEl.classList.remove('tick');
                void pointerEl.offsetWidth; // Trik memicu ulang pembacaan DOM agar animasi bisa berulang
                pointerEl.classList.add('tick');
            }

            if (spinVelocity > 0.0005) {
                requestAnimationFrame(animate);
            } else {
                isSpinning = false;
                pointerEl.classList.remove('tick'); // Pastikan jarum lurus kembali saat berhenti
                calculateWinner();
            }
        }
        animate();
    }

    function calculateWinner() {
        const numSegments = names.length;
        const arcSize = (2 * Math.PI) / numSegments;
        
        let relativeAngle = (1.5 * Math.PI - currentAngle) % (2 * Math.PI);
        if (relativeAngle < 0) relativeAngle += 2 * Math.PI;

        const winnerIndex = Math.floor(relativeAngle / arcSize);
        const pemenang = names[winnerIndex];

        const resultDiv = document.getElementById('result');
        resultDiv.style.color = "#06D6A0"; 
        resultDiv.innerText = "👑 " + pemenang + " 👑";

        /* 
           PERUBAHAN WAKTU JEDA:
           Jeda dinaikkan menjadi 4000ms (4 detik) agar nama pemenang dipajang lebih lama 
           dan memberi kepuasan visual sebelum dieliminasi secara otomatis.
        */
        setTimeout(() => {
            document.getElementById('spinBtn').disabled = false;
            
            const updatedNames = names.filter(name => name !== pemenang);
            document.getElementById('nameList').value = updatedNames.join('\n');
            
            drawWheel(); 
        }, 4000); 
    }

    drawWheel();
</script>

</body>
</html>
