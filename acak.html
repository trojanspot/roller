<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roda Berputar Misterius 🎉</title>
    <!-- CSS akan diletakkan di sini -->
    <style>
    /* Tema latar belakang dunia anak cerah */
    body { 
        font-family: 'Comic Sans MS', 'Chalkboard SE', Arial, sans-serif; 
        text-align: center; 
        margin: 0;
        padding: 30px 10px;
        background: linear-gradient(135deg, #FFE5EC 0%, #CCFBFF 100%); 
        min-height: 100vh;
        box-sizing: border-box;
    }

    h2 {
        color: #FF2E93;
        font-size: 34px;
        text-shadow: 3px 3px 0px #FFF, 5px 5px 0px #FF85A2;
        margin-bottom: 5px;
    }

    p { color: #4A4A4A; font-weight: bold; }

    /* Tata letak fleksibel membagi input dan roda */
    .main-wrapper {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 40px;
        max-width: 900px;
        margin: 20px auto;
    }

    .input-card {
        background: white;
        padding: 25px;
        border-radius: 20px;
        border: 4px solid #57CC99;
        box-shadow: 0 8px 0px #98E2C6;
        width: 300px;
    }

    textarea { 
        width: 90%; 
        height: 180px; 
        padding: 12px; 
        font-size: 16px; 
        border: 3px solid #FFAAA6;
        border-radius: 12px;
        outline: none;
        resize: none;
        font-family: inherit;
    }

    button { 
        padding: 12px 30px; 
        font-size: 18px; 
        font-weight: bold;
        font-family: inherit;
        background: #FF7096; 
        color: white; 
        border: none; 
        border-radius: 50px;
        cursor: pointer; 
        margin-top: 15px; 
        box-shadow: 0 5px 0px #C93B61;
        transition: all 0.1s ease;
    }
    button:hover { background: #FF5C8A; }
    button:active {
        box-shadow: 0 2px 0px #C93B61;
        transform: translateY(3px);
    }
    button:disabled { background: #95a5a6; box-shadow: 0 5px 0px #7f8c8d; cursor: not-allowed; }

    /* Komponen Visual Roda Berputar */
    .wheel-container {
        position: relative;
        width: 400px;
        height: 400px;
    }

    canvas {
        border-radius: 50%;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        border: 8px solid #FFD166;
        background: #fff;
    }

    /* Jarum penunjuk di bagian atas roda */
    .pointer {
        position: absolute;
        top: -15px;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 20px solid transparent;
        border-right: 20px solid transparent;
        border-top: 30px solid #FF3366;
        z-index: 10;
        filter: drop-shadow(0px 3px 2px rgba(0,0,0,0.3));
    }

    /* Pin poros di tengah roda */
    .center-pin {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 30px;
        height: 30px;
        background: #FFD166;
        border: 4px solid #fff;
        border-radius: 50%;
        z-index: 5;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    /* Kotak Hasil Pengumuman */
    #result-box {
        margin: 30px auto 0 auto;
        padding: 15px;
        border-radius: 20px;
        background: #1a1a2e; 
        border: 5px dashed #FFD166;
        max-width: 500px;
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    #result { 
        font-size: 32px; 
        font-weight: bold; 
        color: #FFF;
        text-shadow: 0 0 10px rgba(255,255,255,0.6);
    }
</style>

</head>
<body>

    <h2>🎪 Roda Berputar Misterius 🎉</h2>
    <p>Masukkan nama-nama, lalu putar rodanya!</p>
    
    <div class="main-wrapper">
        <!-- Sisi Kiri: Tempat input daftar nama -->
        <div class="input-card">
            <textarea id="nameList" placeholder="Kimi&#10;Zuzu&#10;Boni&#10;Tatan&#10;Lala" oninput="drawWheel()"></textarea>
            <br>
            <button id="spinBtn" onclick="spinWheel()">PUTAR RODA! 🎡</button>
        </div>
        
        <!-- Sisi Kanan: Area Roda Berputar -->
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
            <div class="center-pin"></div>
        </div>
    </div>

    <div id="result-box">
        <div id="result">Siapa yang beruntung? 🕵️‍♂️</div>
    </div>

    <!-- JavaScript akan diletakkan di sini -->
    <script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const colors = ['#FF477E', '#FFD166', '#06D6A0', '#118AB2', '#8338EC', '#FF006E', '#3A86FF', '#00F5D4', '#FF9F1C', '#4EA8DE'];
    
    let currentAngle = 0;
    let isSpinning = false;
    let names = [];

    // Fungsi menggambar roda berdasarkan nama input
    function drawWheel() {
        const rawText = document.getElementById('nameList').value;
        names = rawText.split('\n').map(name => name.trim()).filter(name => name.length > 0);
        
        const numSegments = names.length;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (numSegments === 0) {
            ctx.fillStyle = "#ccc";
            ctx.beginPath();
            ctx.arc(200, 200, 200, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = "#666";
            ctx.font = "20px Arial";
            ctx.textAlign = "center";
            ctx.fillText("Masukkan nama dahulu", 200, 200);
            return;
        }

        const arcSize = (2 * Math.PI) / numSegments;

        for (let i = 0; i < numSegments; i++) {
            const angle = currentAngle + (i * arcSize);
            
            ctx.fillStyle = colors[i % colors.length];
            ctx.beginPath();
            ctx.moveTo(200, 200);
            ctx.arc(200, 200, 200, angle, angle + arcSize);
            ctx.lineTo(200, 200);
            ctx.fill();
            ctx.stroke();

            ctx.save();
            ctx.translate(200, 200);
            ctx.rotate(angle + (arcSize / 2));
            ctx.textAlign = "right";
            ctx.fillStyle = "#FFF";
            ctx.font = "bold 16px Arial";
            let displayName = names[i];
            if (displayName.length > 12) displayName = displayName.substring(0, 10) + "..";
            ctx.fillText(displayName, 180, 5);
            ctx.restore();
        }
    }

    // Fungsi menjalankan perputaran roda (Versi Mulus & Dramatis)
    function spinWheel() {
        if (isSpinning || names.length === 0) return;

        isSpinning = true;
        document.getElementById('spinBtn').disabled = true;
        document.getElementById('result').innerText = "Roda sedang berputar... 🎡";

        /* 
           --- PENGATURAN DRAMA & KECEPATAN ---
           spinVelocity: Kecepatan awal. Dibuat tinggi (0.8 - 1.2) agar di awal berputar super kencang dan mulus.
           friction: Gaya gesek diturunkan ke 0.993 (sebelumnya 0.985). 
                     Makin mendekati 1, roda akan mengerem secara sangat halus/slow motion dan berputar lebih lama.
        */
        let spinVelocity = Math.random() * 0.4 + 0.8; 
        const friction = 0.993; 

        function animate() {
            currentAngle += spinVelocity; // Menggeser sudut roda
            spinVelocity *= friction;     // Mengurangi kecepatan secara perlahan (efek ngerem)

            drawWheel(); // Menggambar ulang setiap frame lewat requestAnimationFrame (60 FPS Mulus)

            // Batas berhenti diturunkan ke nilai sangat kecil agar drama detak-detak terakhir terasa nyata
            if (spinVelocity > 0.0005) {
                requestAnimationFrame(animate);
            } else {
                isSpinning = false;
                document.getElementById('spinBtn').disabled = false;
                calculateWinner();
            }
        }
        animate();
    }

    // Fungsi menghitung pemenang
    function calculateWinner() {
        const numSegments = names.length;
        const arcSize = (2 * Math.PI) / numSegments;
        
        let normalizedAngle = (1.5 * Math.PI - currentAngle) % (2 * Math.PI);
        if (normalizedAngle < 0) normalizedAngle += 2 * Math.PI;

        const winnerIndex = Math.floor(normalizedAngle / arcSize);
        const pemenang = names[winnerIndex];

        const resultDiv = document.getElementById('result');
        resultDiv.style.color = "#06D6A0"; 
        resultDiv.innerText = "👑 " + pemenang + " 👑";

        const updatedNames = names.filter(name => name !== pemenang);
        document.getElementById('nameList').value = updatedNames.join('\n');
        drawWheel(); 
    }

    drawWheel();
</script>

</body>
</html>
