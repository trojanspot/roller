<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roller Nama Misterius 🎡</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', Arial, sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 40px 20px;
            background: linear-gradient(135deg, #FFE5EC 0%, #CCFBFF 100%); 
            min-height: 100vh;
            box-sizing: border-box;
        }

        h2 {
            color: #FF2E93;
            font-size: 36px;
            text-shadow: 3px 3px 0px #FFF, 5px 5px 0px #FF85A2;
            margin-bottom: 5px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 0px #98E2C6, 0 15px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            margin: 0 auto;
            border: 4px solid #57CC99;
        }

        textarea { 
            width: 90%; 
            height: 120px; 
            padding: 15px; 
            font-size: 16px; 
            border: 3px solid #FFAAA6;
            border-radius: 15px;
            outline: none;
            resize: none;
            background-color: #FFFDF9;
            font-family: inherit;
        }

        button { 
            padding: 15px 40px; 
            font-size: 22px; 
            font-weight: bold;
            font-family: inherit;
            background: #FF7096; 
            color: white; 
            border: none; 
            border-radius: 50px;
            cursor: pointer; 
            margin-top: 20px; 
            box-shadow: 0 6px 0px #C93B61;
            transition: all 0.1s ease;
        }
        button:hover { background: #FF5C8A; }
        button:active {
            box-shadow: 0 2px 0px #C93B61;
            transform: translateY(4px);
        }
        button:disabled {
            background: #95a5a6;
            box-shadow: 0 6px 0px #7f8c8d;
            cursor: not-allowed;
        }

        #result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 20px;
            background: #1a1a2e; 
            border: 5px dashed #FFD166;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #result { 
            font-size: 38px; 
            font-weight: bold; 
            color: #FFF;
            text-shadow: 0 0 12px rgba(255,255,255,0.6);
            transition: transform 0.1s ease-out;
        }
        
        /* Efek getar saat putaran cepat */
        .shake {
            animation: shakeAnim 0.05s infinite alternate;
        }
        @keyframes shakeAnim {
            0% { transform: translate(1px, 1px) scale(1.05); }
            100% { transform: translate(-1px, -1px) scale(1.05); }
        }
    </style>
</head>
<body>

    <h2>🎪 Roller Acak Misterius 🎉</h2>
    <p>Masukkan nama (1 nama per baris), lalu klik putar!</p>
    
    <div class="container">
        <textarea id="nameList" placeholder="Kimi&#10;Zuzu&#10;Boni&#10;Tatan&#10;Lala"></textarea><br>
        
        <button id="spinBtn" onclick="startMisteryRoll()">PUTAR! 🎡</button>
        
        <div id="result-box">
            <div id="result">Siapa selanjutnya? 🕵️‍♂️</div>
        </div>
    </div>

    <script>
        const funColors = ['#FF477E', '#FF7096', '#FFD166', '#06D6A0', '#118AB2', '#8338EC', '#FF006E', '#3A86FF', '#00F5D4'];
        let isSpinning = false;

        function startMisteryRoll() {
            if (isSpinning) return;

            const rawText = document.getElementById('nameList').value;
            // Ambil daftar nama, bersihkan spasi, dan buang baris kosong
            let names = rawText.split('\n').map(name => name.trim()).filter(name => name.length > 0);
            const resultDiv = document.getElementById('result');
            const spinBtn = document.getElementById('spinBtn');

            if (names.length === 0) {
                resultDiv.innerText = "Isi namanya dulu ya! 💬";
                resultDiv.style.color = "#FF477E";
                return;
            }

            // Kunci tombol agar tidak bisa ditekan berkali-kali saat berputar
            isSpinning = true;
            spinBtn.disabled = true;
            resultDiv.classList.add('shake');

            // --- SISTEM ACAK MISTERIUS (Fisher-Yates Shuffle Internal) ---
            // Mengacak urutan array internal terlebih dahulu agar index tidak bisa ditebak secara linear
            for (let i = names.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [names[i], names[j]] = [names[j], names[i]];
            }

            let currentDelay = 30; // Kecepatan awal (sangat cepat: 30ms)
            const maxDelay = 600;  // Kecepatan akhir sebelum berhenti (lambat: 600ms)
            let lastIndex = -1;

            // Fungsi rekursif untuk membuat efek dekselerasi (melambat perlahan)
            function roll() {
                // Cari index acak yang dipastikan TIDAK SAMA dengan nama sebelumnya saat berputar
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * names.length);
                } while (randomIndex === lastIndex && names.length > 1);
                
                lastIndex = randomIndex;
                
                // Tampilkan nama dan warna acak
                resultDiv.innerText = names[randomIndex];
                resultDiv.style.color = funColors[Math.floor(Math.random() * funColors.length)];

                // Tambahkan jeda waktu (efek gesekan/ngerem roda)
                // Naik eksponensial: semakin lama remnya semakin pakem
                currentDelay *= 1.15; 

                if (currentDelay < maxDelay) {
                    // Jika belum mencapai batas lambat, putar lagi dengan delay yang lebih panjang
                    setTimeout(roll, currentDelay);
                } else {
                    // --- SELESAI / BERHENTI ---
                    clearInterval(roll);
                    resultDiv.classList.remove('shake');
                    resultDiv.style.color = "#06D6A0"; // Warna hijau kemenangan
                    const pemenang = names[randomIndex];
                    resultDiv.innerText = "👑 " + pemenang + " 👑";
                    
                    // BONUS: Hapus nama pemenang dari kotak teks agar tidak keluar lagi di putaran berikutnya
                    const updatedNames = names.filter(name => name !== pemenang);
                    document.getElementById('nameList').value = updatedNames.join('\n');
                    
                    // Buka kembali kunci tombol
                    isSpinning = false;
                    spinBtn.disabled = false;
                }
            }

            // Mulai putaran pertama
            roll();
        }
    </script>

</body>
</html>
