<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roller Nama Warna-Warni 🎉</title>
    <style>
        /* Desain latar belakang cerah khas dunia anak */
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial', sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 40px 20px;
            background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%); 
            min-height: 100vh;
            box-sizing: border-box;
        }

        h2 {
            color: #FF477E;
            font-size: 36px;
            text-shadow: 3px 3px 0px #FFF, 5px 5px 0px #FF85A2;
            margin-bottom: 5px;
        }

        p {
            color: #4A4A4A;
            font-size: 16px;
            font-weight: bold;
        }

        /* Wadah Utama Aplikasi */
        .container {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 0px #98E2C6, 0 15px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            margin: 0 auto;
            border: 4px solid #57CC99;
        }

        /* Kotak Input Nama */
        textarea { 
            width: 90%; 
            height: 120px; 
            padding: 15px; 
            font-size: 16px; 
            border: 3px solid #FFAAA6;
            border-radius: 15px;
            outline: none;
            resize: none;
            background-color: #FFFDF9;
            font-family: inherit;
            color: #333;
        }
        textarea:focus {
            border-color: #FF85A2;
            box-shadow: 0 0 10px rgba(255, 133, 162, 0.5);
        }

        /* Tombol Mulai Gaya Wahana Permainan */
        button { 
            padding: 15px 40px; 
            font-size: 22px; 
            font-weight: bold;
            font-family: inherit;
            background: #FF7096; 
            color: white; 
            border: none; 
            border-radius: 50px;
            cursor: pointer; 
            margin-top: 20px; 
            box-shadow: 0 6px 0px #C93B61;
            transition: all 0.1s ease;
        }
        button:hover { 
            background: #FF5C8A; 
        }
        button:active {
            box-shadow: 0 2px 0px #C93B61;
            transform: translateY(4px);
        }

        /* Area Hasil yang Berkedip dan Berubah Warna */
        #result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 20px;
            background: #222; /* Latar belakang gelap agar warna teks menyala */
            border: 5px dashed #FFD166;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #result { 
            font-size: 36px; 
            font-weight: bold; 
            color: #FFF;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

    <h2>🎪 Roller Acak Nama 🎉</h2>
    <p>Tulis nama teman-temanmu di bawah ini:</p>
    
    <div class="container">
        <textarea id="nameList" placeholder="Tulis di sini...&#10;Kimi&#10;Zuzu&#10;Boni"></textarea><br>
        
        <button onclick="startRoll()">PUTAR! 🎡</button>
        
        <div id="result-box">
            <div id="result">Siapa yang beruntung? ✨</div>
        </div>
    </div>

    <script>
        // Kumpulan warna cerah untuk teks saat berputar
        const funColors = ['#FF477E', '#FF7096', '#FF85A2', '#FFD166', '#06D6A0', '#118AB2', '#8338EC', '#FF006E', '#3A86FF'];

        function startRoll() {
            const rawText = document.getElementById('nameList').value;
            const names = rawText.split('\n').map(name => name.trim()).filter(name => name.length > 0);
            const resultDiv = document.getElementById('result');

            if (names.length === 0) {
                resultDiv.innerText = "Isi namanya dulu ya! 💬";
                resultDiv.style.color = "#FF477E";
                return;
            }

            let counter = 0;
            const maxCount = 25; // Jumlah putaran acak
            
            const interval = setInterval(() => {
                // Acak nama
                const randomNameIndex = Math.floor(Math.random() * names.length);
                resultDiv.innerText = names[randomNameIndex];
                
                // Acak warna teks dari daftar funColors
                const randomColorIndex = Math.floor(Math.random() * funColors.length);
                resultDiv.style.color = funColors[randomColorIndex];
                
                counter++;

                if (counter >= maxCount) {
                    clearInterval(interval);
                    // Warna final saat berhenti (Warna Hijau Cerah Sukses)
                    resultDiv.style.color = "#06D6A0"; 
                    resultDiv.innerText = "🎉 " + resultDiv.innerText + " 🎉";
                }
            }, 80); // Kecepatan putaran dipercepat agar lebih seru (80ms)
        }
    </script>

</body>
</html>
